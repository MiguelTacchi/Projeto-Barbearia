<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barbearia Elite — Login</title>
</head>
<body style="margin:0;background:#111827;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;font-family:system-ui,sans-serif">

  <div style="width:100%;max-width:420px">

    <div style="text-align:center;margin-bottom:2rem">
      <div style="font-size:4rem">💈</div>
      <h1 style="color:#fff;font-size:1.75rem;font-weight:700;margin:.5rem 0 0">Barbearia Elite</h1>
      <p style="color:#9ca3af;font-size:.875rem;margin:.25rem 0 0">Agendamento Online</p>
    </div>

    <div style="background:#fff;border-radius:1.25rem;padding:2rem;box-shadow:0 20px 60px rgba(0,0,0,.5)">

      <!-- Seletor de perfil -->
      <div style="display:flex;border-radius:.75rem;overflow:hidden;border:1.5px solid #e5e7eb;margin-bottom:1.5rem">
        <button id="btn-cliente" onclick="selecionarPerfil('cliente')"
          style="flex:1;padding:.75rem .5rem;font-size:.85rem;font-weight:700;background:#d97706;color:#fff;border:none;cursor:pointer;transition:.2s">
          👤 Sou Cliente
        </button>
        <button id="btn-barbeiro" onclick="selecionarPerfil('barbeiro')"
          style="flex:1;padding:.75rem .5rem;font-size:.85rem;font-weight:700;background:#fff;color:#6b7280;border:none;cursor:pointer;transition:.2s">
          ✂️ Sou Barbeiro
        </button>
      </div>

      <form id="form-login" onsubmit="handleSubmit(event)">

        <!-- Nome (só no cadastro) -->
        <div id="campo-nome" style="display:none;margin-bottom:1rem">
          <label style="display:block;font-size:.8rem;font-weight:600;color:#374151;margin-bottom:.375rem">Nome completo</label>
          <input id="nome" type="text" placeholder="Seu nome completo"
            style="width:100%;padding:.75rem 1rem;border:1.5px solid #d1d5db;border-radius:.75rem;font-size:1rem;box-sizing:border-box;outline:none"/>
        </div>

        <!-- Email -->
        <div style="margin-bottom:1rem">
          <label style="display:block;font-size:.8rem;font-weight:600;color:#374151;margin-bottom:.375rem">Email</label>
          <input id="email" type="email" placeholder="seu@email.com" required
            style="width:100%;padding:.75rem 1rem;border:1.5px solid #d1d5db;border-radius:.75rem;font-size:1rem;box-sizing:border-box;outline:none"/>
        </div>

        <!-- Senha -->
        <div style="margin-bottom:1rem">
          <label style="display:block;font-size:.8rem;font-weight:600;color:#374151;margin-bottom:.375rem">Senha</label>
          <input id="senha" type="password" placeholder="••••••••" required minlength="6"
            style="width:100%;padding:.75rem 1rem;border:1.5px solid #d1d5db;border-radius:.75rem;font-size:1rem;box-sizing:border-box;outline:none"/>
        </div>


        <!-- Mensagem de erro -->
        <div id="erro-msg" style="display:none;background:#fef2f2;border:1.5px solid #fca5a5;color:#b91c1c;padding:.75rem 1rem;border-radius:.75rem;font-size:.875rem;margin-bottom:1rem"></div>

        <!-- Botão submit -->
        <button id="btn-submit" type="submit"
          style="width:100%;background:#d97706;color:#fff;font-weight:700;font-size:1rem;padding:.875rem;border-radius:.75rem;border:none;cursor:pointer;transition:.2s">
          Entrar
        </button>
      </form>

      <!-- Link cadastro/login -->
      <div id="link-cadastro" style="margin-top:1.25rem;text-align:center;font-size:.875rem;color:#6b7280">
        Não tem conta?
        <button id="btn-modo" onclick="alternarModo()"
          style="font-weight:700;color:#d97706;background:none;border:none;cursor:pointer;font-size:.875rem">
          Cadastre-se
        </button>
      </div>


    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
