<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barbearia Elite — Barbeiro</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50">

  <header class="bg-gray-900 text-white shadow-lg">
    <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-3xl">💈</span>
        <div>
          <h1 class="font-bold text-lg leading-tight">Barbearia Elite</h1>
          <p class="text-xs text-gray-400">✂️ Painel do Barbeiro</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <p id="user-nome" class="text-sm font-semibold hidden sm:block"></p>
        <button onclick="sair()" class="bg-gray-700 hover:bg-gray-600 text-sm px-4 py-2 rounded-xl transition-colors font-medium">
          Sair
        </button>
      </div>
    </div>
  </header>

  <div class="max-w-4xl mx-auto px-4 py-8">

    <!-- Cards de estatísticas -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-8">
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 text-center">
        <div class="text-2xl mb-1">📅</div>
        <div id="stat-hoje" class="text-2xl font-bold text-gray-800">—</div>
        <div class="text-xs text-gray-500 mt-0.5">Hoje</div>
      </div>
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 text-center">
        <div class="text-2xl mb-1">⏳</div>
        <div id="stat-pendentes" class="text-2xl font-bold text-gray-800">—</div>
        <div class="text-xs text-gray-500 mt-0.5">Pendentes</div>
      </div>
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 text-center">
        <div class="text-2xl mb-1">✅</div>
        <div id="stat-confirmados" class="text-2xl font-bold text-gray-800">—</div>
        <div class="text-xs text-gray-500 mt-0.5">Confirmados</div>
      </div>
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 text-center">
        <div class="text-2xl mb-1">⭐</div>
        <div id="stat-concluidos" class="text-2xl font-bold text-gray-800">—</div>
        <div class="text-xs text-gray-500 mt-0.5">Concluídos</div>
      </div>
    </div>

    <!-- Abas -->
    <div class="flex gap-2 mb-6">
      <button onclick="trocarAba('agendamentos')" id="aba-agendamentos"
        class="px-5 py-2.5 rounded-xl font-semibold text-sm bg-yellow-500 text-white shadow-md transition-all">
        📅 Agendamentos
      </button>
      <button onclick="trocarAba('servicos')" id="aba-servicos"
        class="px-5 py-2.5 rounded-xl font-semibold text-sm bg-white text-gray-600 hover:bg-gray-100 border border-gray-200 transition-all">
        ✂️ Serviços
      </button>
    </div>

    <!-- Painel Agendamentos -->
    <div id="painel-agendamentos">
      <div class="flex flex-wrap items-center gap-3 mb-6">
        <label class="text-sm font-semibold text-gray-700">Filtrar por data:</label>
        <input type="date" id="filtro-data" onchange="carregarAgendamentos()"
          class="px-3 py-2 border border-gray-300 rounded-xl text-sm focus:ring-2 focus:ring-yellow-400 outline-none"/>
        <button onclick="limparFiltro()" id="btn-limpar"
          class="hidden text-sm text-gray-500 hover:text-gray-700 underline">
          Limpar filtro
        </button>
      </div>
      <div id="lista-agendamentos">
        <div class="text-center py-12 text-gray-400">Carregando...</div>
      </div>
    </div>

    <!-- Painel Serviços -->
    <div id="painel-servicos" class="hidden">

      <!-- Formulário adicionar/editar -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-6">
        <h2 id="titulo-form-servico" class="text-lg font-bold text-gray-800 mb-4">Novo Serviço</h2>
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Nome do serviço</label>
            <input id="s-nome" type="text" placeholder="Ex: Corte"
              class="w-full px-3 py-2.5 border border-gray-300 rounded-xl text-sm focus:ring-2 focus:ring-yellow-400 outline-none"/>
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Duração (minutos)</label>
            <input id="s-duracao" type="number" min="15" step="15" placeholder="60"
              class="w-full px-3 py-2.5 border border-gray-300 rounded-xl text-sm focus:ring-2 focus:ring-yellow-400 outline-none"/>
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Preço (R$)</label>
            <input id="s-preco" type="number" min="0" step="0.01" placeholder="35.00"
              class="w-full px-3 py-2.5 border border-gray-300 rounded-xl text-sm focus:ring-2 focus:ring-yellow-400 outline-none"/>
          </div>
        </div>
        <div id="erro-servico" class="hidden mt-3 text-sm text-red-600 font-medium"></div>
        <div class="flex gap-2 mt-4">
          <button onclick="salvarServico()" id="btn-salvar-servico"
            class="bg-yellow-500 hover:bg-yellow-600 text-white font-semibold px-5 py-2.5 rounded-xl text-sm transition-all">
            Salvar
          </button>
          <button onclick="cancelarEdicao()" id="btn-cancelar-servico" class="hidden bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold px-5 py-2.5 rounded-xl text-sm transition-all">
            Cancelar
          </button>
        </div>
      </div>

      <!-- Lista de serviços -->
      <div id="lista-servicos">
        <div class="text-center py-8 text-gray-400">Carregando serviços...</div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/barbeiro.js"></script>
</body>
</html>
